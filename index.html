<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1.0, user-scalable=yes">
    <title>YT2TikTok · Recorta, Subtitula y Exporta</title>
    <!-- ========== ESTILOS (conserva todo el diseño anterior) ========== -->
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-card: #1a1a1a;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #ff0050;
            --accent-yt: #ff0000;
            --border: #2a2a2a;
            --success: #00f7a7;
            --danger: #ff4444;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            line-height: 1.5;
            background-image: radial-gradient(ellipse at 20% 0%, rgba(255,0,80,0.06) 0%, transparent 50%);
        }
        .header {
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top:0;
            z-index:100;
            flex-wrap: wrap;
            gap:12px;
        }
        .logo { font-weight:800; font-size:1.3rem; display:flex; align-items:center; gap:8px; }
        .logo .yt { color:#ff0000; } .logo .tt { color:var(--accent); }
        .badge { background:var(--accent); color:#fff; font-size:0.7rem; padding:4px 12px; border-radius:20px; font-weight:600; }
        .main-container { max-width:1100px; margin:0 auto; padding:16px; display:flex; flex-direction:column; gap:18px; }
        .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); }
        .card-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; font-weight:700; font-size:0.85rem; letter-spacing:0.5px; color:var(--text-secondary); text-transform:uppercase; }
        .dot { width:8px; height:8px; border-radius:50%; }
        .dot.red{background:#ff4444;} .dot.pink{background:var(--accent);} .dot.green{background:var(--success);}
        .url-input-group { display:flex; gap:10px; flex-wrap:wrap; }
        .url-input-group input { flex:1; min-width:250px; padding:13px 16px; background:#111; border:2px solid var(--border); border-radius:var(--radius-sm); color:#fff; font-size:0.95rem; outline:none; }
        .url-input-group input:focus { border-color:var(--accent-yt); }
        .btn { padding:12px 20px; border:none; border-radius:var(--radius-sm); font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:0.9rem; transition: all 0.2s; }
        .btn-load { background:#ff0000; color:#fff; }
        .btn-accent { background:var(--accent); color:#fff; }
        .btn-outline { background:transparent; border:2px solid var(--border); color:#fff; }
        .btn-success { background:#00c853; color:#000; }
        .btn-danger { background:#ff4444; color:#fff; }
        .btn-sm { padding:7px 14px; font-size:0.8rem; }
        .btn-xs { padding:5px 10px; font-size:0.7rem; }
        .btn:disabled { opacity:0.4; cursor:not-allowed; }
        .player-wrapper { position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:var(--radius-sm); overflow:hidden; max-height:480px; }
        .player-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
        .subtitle-overlay {
            position:absolute; bottom:12%; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.85); color:#fff; padding:10px 20px; border-radius:8px;
            font-size:1.2rem; font-weight:600; text-align:center; pointer-events:none;
            z-index:10; max-width:85%; text-shadow:0 2px 4px black; letter-spacing:0.3px;
        }
        .trim-section { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        @media(max-width:600px){ .trim-section{grid-template-columns:1fr;} }
        .trim-group label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); display:block; margin-bottom:4px; }
        .trim-group input[type="range"] { width:100%; -webkit-appearance:none; height:6px; background:#333; border-radius:3px; }
        .trim-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; background:var(--accent); border:3px solid white; border-radius:50%; cursor:pointer; }
        .time-display { display:flex; align-items:center; gap:8px; font-family:monospace; font-size:1.2rem; font-weight:700; margin-top:4px; }
        .time-val { background:#111; padding:6px 12px; border-radius:6px; }
        .subtitle-table-wrap { max-height:280px; overflow-y:auto; border-radius:var(--radius-sm); border:1px solid var(--border); }
        table.subtitle-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
        table.subtitle-table th { background:#111; padding:10px 8px; text-align:left; font-size:0.7rem; color:var(--text-secondary); position:sticky; top:0; }
        table.subtitle-table td { padding:8px; border-bottom:1px solid #1f1f1f; }
        table.subtitle-table input { background:#111; border:1px solid #2a2a2a; color:#fff; padding:6px; border-radius:4px; width:100%; }
        .active-sub { background:rgba(255,0,80,0.15) !important; border-left:3px solid var(--accent); }
        .toast-container { position:fixed; top:16px; right:16px; z-index:300; display:flex; flex-direction:column; gap:8px; }
        .toast { background:#222; border:1px solid #444; color:#fff; padding:12px 18px; border-radius:8px; font-size:0.85rem; animation: slideIn 0.3s ease; max-width:300px; }
        @keyframes slideIn{ from{transform:translateX(120%);} to{transform:translateX(0);} }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:flex; align-items:center; justify-content:center; }
        .modal { background:#1a1a1a; border:1px solid var(--border); border-radius:var(--radius); padding:28px; width:90%; max-width:420px; text-align:center; }
        .progress-bar-wrap { background:#222; border-radius:8px; height:10px; margin:16px 0; }
        .progress-bar-fill { height:100%; background:var(--accent); border-radius:8px; transition: width 0.5s; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo"><span class="yt">▶ YouTube</span> → <span class="tt">♪ TikTok</span></div>
        <span class="badge">Clip Maker</span>
    </header>

    <div class="main-container">
        <!-- Carga de URL -->
        <div class="card">
            <div class="card-header"><span class="dot red"></span> Cargar Video</div>
            <div class="url-input-group">
                <input type="text" id="youtube-url" placeholder="https://youtube.com/watch?v=...">
                <button class="btn btn-load" id="btn-load">📥 Cargar</button>
            </div>
        </div>

        <!-- Reproductor -->
        <div class="card" id="card-player" style="display:none;">
            <div class="card-header"><span class="dot pink"></span> Vista Previa <span id="current-time-live" style="margin-left:auto;">00:00</span></div>
            <div class="player-wrapper" id="player-wrapper"><div id="youtube-player"></div><div class="subtitle-overlay" id="subtitle-overlay"></div></div>
        </div>

        <!-- Recorte -->
        <div class="card" id="card-trim" style="display:none;">
            <div class="card-header"><span class="dot pink"></span> Recortar Clip <span id="clip-duration-badge" class="badge" style="margin-left:auto;">Duración 00:00</span></div>
            <div class="trim-section">
                <div class="trim-group">
                    <label>🎬 Inicio</label>
                    <input type="range" id="trim-start-range" min="0" max="100" value="0" step="0.1">
                    <div class="time-display"><span class="time-val" id="trim-start-display">00:00</span><button class="btn btn-outline btn-xs" id="btn-mark-start">📍 Actual</button></div>
                </div>
                <div class="trim-group">
                    <label>🏁 Fin</label>
                    <input type="range" id="trim-end-range" min="0" max="100" value="100" step="0.1">
                    <div class="time-display"><span class="time-val" id="trim-end-display">00:00</span><button class="btn btn-outline btn-xs" id="btn-mark-end">📍 Actual</button></div>
                </div>
            </div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-outline btn-sm" id="btn-play-trim">▶ Reproducir clip</button>
                <button class="btn btn-outline btn-sm" id="btn-reset-trim">↺ Reset</button>
            </div>
        </div>

        <!-- Subtítulos -->
        <div class="card" id="card-subs" style="display:none;">
            <div class="card-header"><span class="dot green"></span> Subtítulos <span id="sub-count" style="margin-left:auto;">0</span></div>
            <div class="subtitle-table-wrap">
                <table class="subtitle-table"><thead><tr><th>#</th><th>Texto</th><th>Inicio</th><th>Fin</th><th></th></tr></thead><tbody id="subtitle-tbody"></tbody></table>
            </div>
            <div class="quick-actions" style="margin-top:10px; display:flex; gap:8px;">
                <button class="btn btn-accent btn-sm" id="btn-add-sub">➕ Añadir</button>
                <button class="btn btn-outline btn-sm" id="btn-add-sub-current">📍 Desde ahora</button>
                <button class="btn btn-outline btn-sm" id="btn-clear-subs">🗑 Limpiar</button>
                <button class="btn btn-outline btn-sm" id="btn-save-project">💾 Guardar</button>
            </div>
        </div>

        <!-- Exportar -->
        <div class="card" id="card-upload" style="display:none;">
            <div class="card-header"><span class="dot green"></span> Exportar a TikTok</div>
            <p><strong id="summary-duration">00:00</strong> · <strong id="summary-subs">0</strong> subtítulos · Formato 9:16</p>
            <button class="btn btn-success" id="btn-upload-tiktok" style="width:100%; margin-top:12px; padding:14px;">🚀 Subir a TikTok</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <div class="modal-overlay" id="modal-overlay" style="display:none;"><div class="modal" id="modal-content"></div></div>

    <script>
        // ==================== VARIABLES GLOBALES ====================
        let player = null, playerReady = false, videoDuration = 0, videoId = null;
        let trimStart = 0, trimEnd = 0;
        let subtitles = [], subtitleIdCounter = 0, currentActiveSubId = null;
        let updateInterval = null;
        const UPDATE_INTERVAL_MS = 220; // más suave

        // ==================== ELEMENTOS DEL DOM ====================
        const $ = (id) => document.getElementById(id);
        const $youtubeUrl = $('youtube-url'), $btnLoad = $('btn-load');
        const $cardPlayer = $('card-player'), $cardTrim = $('card-trim'), $cardSubs = $('card-subs'), $cardUpload = $('card-upload');
        const $subtitleOverlay = $('subtitle-overlay'), $currentTimeLive = $('current-time-live');
        const $trimStartRange = $('trim-start-range'), $trimEndRange = $('trim-end-range');
        const $trimStartDisplay = $('trim-start-display'), $trimEndDisplay = $('trim-end-display');
        const $clipDurationBadge = $('clip-duration-badge');
        const $subtitleTbody = $('subtitle-tbody'), $subCount = $('sub-count');
        const $summaryDuration = $('summary-duration'), $summarySubs = $('summary-subs');
        const $btnMarkStart = $('btn-mark-start'), $btnMarkEnd = $('btn-mark-end');
        const $btnPlayTrim = $('btn-play-trim'), $btnResetTrim = $('btn-reset-trim');
        const $btnAddSub = $('btn-add-sub'), $btnAddSubCurrent = $('btn-add-sub-current');
        const $btnClearSubs = $('btn-clear-subs'), $btnUploadTiktok = $('btn-upload-tiktok');
        const $btnSaveProject = $('btn-save-project');
        const $modalOverlay = $('modal-overlay'), $modalContent = $('modal-content');
        const $toastContainer = $('toast-container');

        // ==================== UTILIDADES ====================
        function formatTime(sec) {
            if (isNaN(sec) || sec < 0) return '00:00';
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        }
        function formatTimeMs(sec) {
            if (isNaN(sec) || sec < 0) return '00:00.0';
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60), ms = Math.floor((sec%1)*10);
            return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+ms;
        }
        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
            $toastContainer.appendChild(t);
            setTimeout(() => t.remove(), 2800);
        }
        function extractYouTubeID(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtu\.be\/|shorts\/|embed\/|watch\?.*v=)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        // ==================== YOUTUBE API ====================
        function loadYouTubeAPI() {
            if (window.YT && window.YT.Player) return;
            const script = document.createElement('script');
            script.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(script);
        }
        window.onYouTubeIframeAPIReady = () => {
            console.log('YT API ready');
            if (videoId && !player) createPlayer(videoId);
        };

        function createPlayer(vid) {
            stopUpdateLoop();
            if (player) { try { player.destroy(); } catch(e){} }
            $('youtube-player').innerHTML = '';
            player = new YT.Player('youtube-player', {
                videoId: vid,
                playerVars: { autoplay:0, controls:1, modestbranding:1, rel:0, fs:1 },
                events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange, onError: onPlayerError }
            });
        }

        function onPlayerReady() {
            playerReady = true;
            videoDuration = player.getDuration();
            trimStart = 0; trimEnd = videoDuration;
            updateTrimUI();
            $cardPlayer.style.display = $cardTrim.style.display = $cardSubs.style.display = $cardUpload.style.display = '';
            startUpdateLoop();
            updateSummary();
            showToast('✅ Video listo', 'success');
            $cardPlayer.scrollIntoView({behavior:'smooth'});
        }
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) startUpdateLoop();
            if (event.data === YT.PlayerState.ENDED && trimEnd < videoDuration - 0.2) {
                setTimeout(() => { if(playerReady){ player.seekTo(trimStart,true); player.playVideo(); } }, 250);
            }
        }
        function onPlayerError() { showToast('❌ Error al cargar video', 'error'); }

        function startUpdateLoop() {
            stopUpdateLoop();
            updateInterval = setInterval(updateLiveData, UPDATE_INTERVAL_MS);
        }
        function stopUpdateLoop() {
            if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
        }

        function updateLiveData() {
            if (!playerReady || !player) return;
            try {
                const ct = player.getCurrentTime();
                $currentTimeLive.textContent = formatTime(ct);

                let activeSub = null;
                for (const sub of subtitles) {
                    if (ct >= sub.startTime && ct <= sub.endTime) { activeSub = sub; break; }
                }
                if (activeSub && activeSub.id !== currentActiveSubId) {
                    currentActiveSubId = activeSub.id;
                    $subtitleOverlay.textContent = activeSub.text;
                    highlightSubtitleRow(activeSub.id);
                } else if (!activeSub && currentActiveSubId !== null) {
                    currentActiveSubId = null;
                    $subtitleOverlay.textContent = '';
                    highlightSubtitleRow(null);
                }
                if (activeSub && activeSub.id === currentActiveSubId && $subtitleOverlay.textContent !== activeSub.text) {
                    $subtitleOverlay.textContent = activeSub.text;
                }
                if (trimEnd < videoDuration && ct >= trimEnd) {
                    player.seekTo(trimStart, true);
                    player.playVideo();
                }
            } catch(e) { /* ignorar */ }
        }

        function highlightSubtitleRow(subId) {
            document.querySelectorAll('#subtitle-tbody tr').forEach(row => {
                row.classList.toggle('active-sub', subId !== null && row.dataset.subId === String(subId));
            });
        }

        // ==================== RECORTE ====================
        function updateTrimUI() {
            $trimStartRange.max = videoDuration; $trimEndRange.max = videoDuration;
            $trimStartRange.value = trimStart; $trimEndRange.value = trimEnd;
            updateTrimDisplays(); updateClipDurationBadge();
        }
        function updateTrimDisplays() {
            $trimStartDisplay.textContent = formatTimeMs(trimStart);
            $trimEndDisplay.textContent = formatTimeMs(trimEnd);
        }
        function updateClipDurationBadge() {
            const dur = Math.max(0, trimEnd - trimStart);
            $clipDurationBadge.textContent = 'Duración ' + formatTime(dur);
        }
        function setTrimStart(val) {
            trimStart = Math.max(0, Math.min(val, trimEnd - 1));
            if (trimStart >= trimEnd) trimStart = Math.max(0, trimEnd - 1);
            $trimStartRange.value = trimStart; updateTrimDisplays(); updateClipDurationBadge(); updateSummary();
        }
        function setTrimEnd(val) {
            trimEnd = Math.min(videoDuration, Math.max(val, trimStart + 1));
            if (trimEnd <= trimStart) trimEnd = Math.min(videoDuration, trimStart + 1);
            $trimEndRange.value = trimEnd; updateTrimDisplays(); updateClipDurationBadge(); updateSummary();
        }

        $trimStartRange.addEventListener('input', () => setTrimStart(parseFloat($trimStartRange.value)));
        $trimEndRange.addEventListener('input', () => setTrimEnd(parseFloat($trimEndRange.value)));
        $btnMarkStart.addEventListener('click', () => { if(playerReady) setTrimStart(player.getCurrentTime()); });
        $btnMarkEnd.addEventListener('click', () => { if(playerReady) setTrimEnd(player.getCurrentTime()); });
        $btnPlayTrim.addEventListener('click', () => { if(playerReady) { player.seekTo(trimStart,true); player.playVideo(); } });
        $btnResetTrim.addEventListener('click', () => { trimStart=0; trimEnd=videoDuration; updateTrimUI(); updateSummary(); });

        // ==================== SUBTÍTULOS ====================
        function renderSubtitles() {
            $subtitleTbody.innerHTML = '';
            if (subtitles.length === 0) {
                $subtitleTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#555;">Sin subtítulos</td></tr>';
            } else {
                subtitles.forEach((sub, idx) => {
                    const tr = document.createElement('tr'); tr.dataset.subId = sub.id;
                    tr.innerHTML = `
                        <td>${idx+1}</td>
                        <td><input type="text" value="${escapeHtml(sub.text)}" data-id="${sub.id}" class="sub-text"></td>
                        <td><input type="number" value="${sub.startTime.toFixed(1)}" step="0.1" data-id="${sub.id}" class="sub-start" style="width:70px;"></td>
                        <td><input type="number" value="${sub.endTime.toFixed(1)}" step="0.1" data-id="${sub.id}" class="sub-end" style="width:70px;"></td>
                        <td><button class="btn btn-danger btn-xs del-sub" data-id="${sub.id}">✕</button></td>`;
                    $subtitleTbody.appendChild(tr);
                });
                // listeners delegados
                $subtitleTbody.querySelectorAll('.sub-text').forEach(inp => inp.addEventListener('input', (e) => {
                    const sub = subtitles.find(s => s.id == e.target.dataset.id); if(sub) sub.text = e.target.value;
                    updateSummary();
                }));
                $subtitleTbody.querySelectorAll('.sub-start, .sub-end').forEach(inp => inp.addEventListener('input', (e) => {
                    const sub = subtitles.find(s => s.id == e.target.dataset.id);
                    if(sub) { sub[e.target.classList.contains('sub-start')?'startTime':'endTime'] = parseFloat(e.target.value)||0; }
                    updateSummary();
                }));
                $subtitleTbody.querySelectorAll('.del-sub').forEach(btn => btn.addEventListener('click', (e) => deleteSubtitle(parseInt(e.target.dataset.id))));
            }
            $subCount.textContent = subtitles.length + ' subtítulo' + (subtitles.length!==1?'s':'');
            updateSummary();
        }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function addSubtitle(text='', start=null, end=null) {
            if (start===null && playerReady) start = player.getCurrentTime();
            if (start===null) start = trimStart;
            if (end===null) end = start + 3;
            if (end <= start) end = start + 3;
            subtitles.push({ id: ++subtitleIdCounter, text: text||'Subtítulo', startTime: Math.round(start*10)/10, endTime: Math.round(end*10)/10 });
            subtitles.sort((a,b) => a.startTime - b.startTime);
            renderSubtitles();
            showToast('➕ Subtítulo añadido');
        }
        function deleteSubtitle(id) {
            subtitles = subtitles.filter(s => s.id !== id);
            if (currentActiveSubId === id) { currentActiveSubId=null; $subtitleOverlay.textContent=''; }
            renderSubtitles();
        }

        $btnAddSub.addEventListener('click', () => addSubtitle());
        $btnAddSubCurrent.addEventListener('click', () => { if(playerReady) addSubtitle('', player.getCurrentTime()); });
        $btnClearSubs.addEventListener('click', () => { if(subtitles.length && confirm('¿Eliminar todos?')) { subtitles=[]; renderSubtitles(); } });

        // ==================== CARGA DE VIDEO ====================
        $btnLoad.addEventListener('click', () => {
            const url = $youtubeUrl.value.trim();
            const id = extractYouTubeID(url);
            if (!id) { showToast('❌ URL no válida', 'error'); return; }
            videoId = id;
            subtitles = []; currentActiveSubId = null; $subtitleOverlay.textContent = '';
            trimStart = 0; trimEnd = 0; videoDuration = 0;
            renderSubtitles();
            stopUpdateLoop();
            if (player) { try{player.destroy();}catch(e){} player=null; }
            playerReady = false;
            $('youtube-player').innerHTML = '';
            $cardPlayer.style.display = ''; $cardTrim.style.display = 'none'; $cardSubs.style.display = 'none'; $cardUpload.style.display = 'none';
            createPlayer(videoId);
            showToast('🔄 Cargando...');
        });

        // ==================== RESUMEN / GUARDADO ====================
        function updateSummary() {
            const dur = Math.max(0, trimEnd - trimStart);
            $summaryDuration.textContent = formatTime(dur);
            $summarySubs.textContent = subtitles.length;
        }

        function saveProjectToStorage() {
            const data = { videoId, trimStart, trimEnd, subtitles };
            localStorage.setItem('yt2tiktok_project', JSON.stringify(data));
            showToast('💾 Proyecto guardado', 'success');
        }
        function loadProjectFromStorage() {
            const saved = localStorage.getItem('yt2tiktok_project');
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                if (data.videoId) {
                    $youtubeUrl.value = 'https://youtu.be/' + data.videoId;
                    videoId = data.videoId;
                    trimStart = data.trimStart || 0;
                    trimEnd = data.trimEnd || 0;
                    subtitles = data.subtitles || [];
                    subtitleIdCounter = subtitles.reduce((max, s) => Math.max(max, s.id), 0);
                    createPlayer(videoId);
                    // Después de onReady se aplicarán trim y subs
                    return true;
                }
            } catch(e) { console.warn('Error cargando proyecto'); }
            return false;
        }
        $btnSaveProject.addEventListener('click', saveProjectToStorage);

        // ==================== SIMULACIÓN TIKTOK ====================
        $btnUploadTiktok.addEventListener('click', () => {
            if (trimEnd - trimStart < 1) { showToast('⚠️ El clip debe durar al menos 1s', 'error'); return; }
            $modalOverlay.style.display = '';
            $modalContent.innerHTML = `<h3>🚀 Procesando...</h3><div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div><p id="progress-step">Preparando</p>`;
            const steps = [
                { msg:'📥 Descargando...', pct:20, delay:1000 },
                { msg:'✂️ Recortando...', pct:40, delay:900 },
                { msg:'📝 Subtítulos...', pct:60, delay:1100 },
                { msg:'📱 Optimizando 9:16...', pct:80, delay:1000 },
                { msg:'☁️ Subiendo...', pct:95, delay:1400 },
                { msg:'✅ ¡Publicado!', pct:100, delay:600 }
            ];
            let i=0;
            function next() {
                if(i>=steps.length) {
                    $modalContent.innerHTML = `<div style="font-size:3rem;">✅</div><h3>Video listo en TikTok</h3><button class="btn btn-accent" id="btn-close-modal">Cerrar</button>`;
                    $('btn-close-modal').addEventListener('click', ()=> $modalOverlay.style.display='none');
                    return;
                }
                const s = steps[i];
                $('progress-fill').style.width = s.pct+'%';
                $('progress-step').textContent = s.msg;
                i++;
                setTimeout(next, s.delay);
            }
            next();
        });
        $modalOverlay.addEventListener('click', (e) => { if(e.target===$modalOverlay && $modalContent.querySelector('#btn-close-modal')) $modalOverlay.style.display='none'; });

        // ==================== ATAJOS DE TECLADO ====================
        document.addEventListener('keydown', (e) => {
            if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.isContentEditable) return;
            if (!playerReady) return;
            const key = e.key.toLowerCase();
            if (key === ' ') { e.preventDefault(); player.getPlayerState()===1 ? player.pauseVideo() : player.playVideo(); }
            else if (key === 'i') { e.preventDefault(); setTrimStart(player.getCurrentTime()); }
            else if (key === 'o') { e.preventDefault(); setTrimEnd(player.getCurrentTime()); }
            else if (key === 's') { e.preventDefault(); addSubtitle('', player.getCurrentTime()); }
            else if (key === 'arrowleft') { e.preventDefault(); player.seekTo(Math.max(0, player.getCurrentTime()-5), true); }
            else if (key === 'arrowright') { e.preventDefault(); player.seekTo(Math.min(videoDuration, player.getCurrentTime()+5), true); }
        });

        // ==================== MANEJO GLOBAL DE ERRORES ====================
        window.addEventListener('error', (e) => {
            console.error('Error capturado:', e.message);
            showToast('❌ Error inesperado', 'error');
        });

        // ==================== INICIALIZACIÓN ====================
        function init() {
            loadYouTubeAPI();
            renderSubtitles();
            // Intentar cargar proyecto previo
            if (!loadProjectFromStorage()) {
                $cardPlayer.style.display = 'none'; $cardTrim.style.display = 'none'; $cardSubs.style.display = 'none'; $cardUpload.style.display = 'none';
            }
            console.log('🎬 YT2TikTok listo. Atajos: I/O recorte, S subtítulo, espacio play');
        }
        init();
    </script>
</body>
</html>
